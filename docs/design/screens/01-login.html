<style>
        body {
            background-color: #0b1326;
            background-image: radial-gradient(circle at 50% 50%, #131b2e 0%, #0b1326 100%);
        }
        .glass-card {
            background: rgba(45, 52, 73, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
      </style>

<body class="font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30">
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="balance">balance</span>
<span class="text-2xl font-bold tracking-widest text-primary uppercase font-headline">Juris AI</span>
</div>
<p class="text-outline text-xs tracking-[0.2em] font-medium uppercase">Sovereign Counsel</p>
</div>
<!-- Glassmorphism Card -->
<section class="glass-card rounded-[2rem] p-10 shadow-2xl shadow-black/40 border border-white/5">
<div class="mb-8">
<h1 class="text-2xl font-bold text-white mb-2 font-headline">Bem-vindo de volta</h1>
<p class="text-outline text-sm">Gerencie seu escritório com inteligência artificial</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">E-mail</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Senha</label>
<a class="text-xs font-semibold text-primary hover:text-primary-fixed transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 text-white placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 active:scale-[0.98] transition-all uppercase tracking-widest text-sm" type="submit">
                    Entrar
                </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-outline uppercase tracking-widest">ou</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Google Login -->
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-outline-variant hover:bg-white/5 text-white py-4 rounded-xl transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="Google logo colorful emblem" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAdYKV1OXT93VIDdWw6yimuSsqeVu40r7v2mvfvmF9UMgZj_zNi70pxkOj02rWoKv08zCT0TYvn13d6SOYIWbod47YjmgEUQSbO3WPa3mp0x3QV49MJnCx1mOtQzvYJvpCc1hy822cU2GZAmS6yHeFakYQ-Yw1tuVx26L7RKWumXX0X7UUg4FUgSkozI2knFKSQPnuTZCga5nlS4u4bx-rsRkspGFZu-oUa8F38nIC36QO9S0vQAcf0EDvl6ssBOeFf4Av5WFnAVfJ"/>
<span class="text-sm font-semibold tracking-wide">Entrar com Google</span>
</button>
</section>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-outline text-sm">
                Não tem conta? 
                <a class="text-primary font-semibold underline underline-offset-4 decoration-primary/30 hover:decoration-primary transition-all" href="#">Cadastre-se</a>
</p>
</div>
</main>
<!-- Page Footer -->
<footer class="mt-12 text-center">
<p class="text-[10px] uppercase tracking-[0.3em] text-outline/40 font-medium">
            © 2026 Juris AI — Powered by IA
        </p>
</footer>
<!-- Abstract Decorative Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[40vw] h-[40vw] rounded-full bg-secondary-container/10 blur-[120px] pointer-events-none"></div>
