<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#e6c487",
              "on-tertiary-fixed": "#081b3b",
              "surface-container": "#171f33",
              "outline": "#998f81",
              "on-secondary-fixed": "#0d1c2d",
              "on-error-container": "#ffdad6",
              "on-background": "#dae2fd",
              "outline-variant": "#4d463a",
              "on-secondary": "#233143",
              "on-primary": "#412d00",
              "secondary": "#b9c8de",
              "on-primary-container": "#543d0c",
              "on-tertiary": "#203051",
              "inverse-surface": "#dae2fd",
              "surface-container-highest": "#2d3449",
              "surface": "#0b1326",
              "surface-container-high": "#222a3d",
              "primary-fixed-dim": "#e4c285",
              "tertiary": "#b8c8f2",
              "tertiary-container": "#9dadd5",
              "on-error": "#690005",
              "secondary-container": "#39485a",
              "inverse-on-surface": "#283044",
              "on-primary-fixed": "#261900",
              "error-container": "#93000a",
              "secondary-fixed-dim": "#b9c8de",
              "tertiary-fixed-dim": "#b6c6ef",
              "surface-container-lowest": "#060e20",
              "on-surface": "#dae2fd",
              "on-secondary-fixed-variant": "#39485a",
              "error": "#ffb4ab",
              "surface-bright": "#31394d",
              "secondary-fixed": "#d4e4fa",
              "surface-variant": "#2d3449",
              "inverse-primary": "#745a27",
              "primary-fixed": "#ffdea4",
              "primary-container": "#c9a96e",
              "surface-container-low": "#131b2e",
              "on-tertiary-container": "#314163",
              "on-surface-variant": "#d0c5b5",
              "on-tertiary-fixed-variant": "#374669",
              "surface-dim": "#0b1326",
              "on-secondary-container": "#a7b6cc",
              "surface-tint": "#e4c285",
              "on-primary-fixed-variant": "#5a4312",
              "tertiary-fixed": "#d8e2ff",
              "background": "#0b1326"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-modal {
        background: rgba(45, 52, 73, 0.6);
        backdrop-filter: blur(20px);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- Background Content Simulation -->
<div class="fixed inset-0 overflow-hidden pointer-events-none opacity-40">
<div class="p-12 space-y-8">
<div class="h-12 w-64 bg-surface-container rounded-xl"></div>
<div class="grid grid-cols-3 gap-6">
<div class="h-64 bg-surface-container rounded-xl"></div>
<div class="h-64 bg-surface-container-high rounded-xl"></div>
<div class="h-64 bg-surface-container rounded-xl"></div>
</div>
<div class="h-96 w-full bg-surface-container-low rounded-xl"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface/80 backdrop-blur-sm">
<!-- Modal Container -->
<div class="w-full max-w-2xl glass-modal rounded-xl overflow-hidden shadow-2xl border border-outline-variant/20">
<!-- Modal Header -->
<div class="flex items-center justify-between px-8 py-6 border-b border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="edit_note">edit_note</span>
</div>
<div>
<h2 class="text-xl font-headline font-bold tracking-tight text-on-surface">Adicionar Nota Interna</h2>
<p class="text-xs font-label uppercase tracking-widest text-outline">Juris AI Collaboration</p>
</div>
</div>
<button class="text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-8 space-y-6">
<!-- Mentions/Collaboration Header -->
<div class="flex items-center justify-between">
<span class="text-xs font-label uppercase tracking-widest text-outline">Conteúdo da Nota</span>
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-highest/50 rounded-full border border-outline-variant/20">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="alternate_email">alternate_email</span>
<span class="text-xs text-on-surface-variant">Mencionar equipe</span>
</div>
</div>
<!-- Text Area Container -->
<div class="relative group">
<textarea class="w-full h-48 bg-surface-container-lowest/50 border-none rounded-xl p-6 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 resize-none transition-all" placeholder="Digite sua nota interna aqui... Use @ para marcar um colega de equipe."></textarea>
<!-- Floating Suggestion (Simulated Mention) -->
<div class="absolute bottom-4 right-4 flex items-center gap-2 text-[10px] text-outline italic">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        As notas são criptografadas e restritas ao caso.
                    </div>
</div>
<!-- Settings Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
<!-- Visibility Toggle -->
<div class="space-y-3">
<label class="text-xs font-label uppercase tracking-widest text-outline block">Visibilidade</label>
<div class="flex p-1 bg-surface-container-low rounded-xl border border-outline-variant/10">
<button class="flex-1 flex items-center justify-center gap-2 py-2 px-4 rounded-lg bg-surface-container-highest text-primary text-sm font-medium transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
                                Toda a equipe
                            </button>
<button class="flex-1 flex items-center justify-center gap-2 py-2 px-4 rounded-lg text-outline hover:text-on-surface transition-all text-sm font-medium">
<span class="material-symbols-outlined text-[18px]" data-icon="lock">lock</span>
                                Apenas eu
                            </button>
</div>
</div>
<!-- Member Selection / Tagging -->
<div class="space-y-3">
<label class="text-xs font-label uppercase tracking-widest text-outline block">Notificar Membro</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl py-2.5 pl-4 pr-10 text-on-surface-variant text-sm appearance-none focus:ring-2 focus:ring-primary/20">
<option>Selecionar colega...</option>
<option>Dr. Ricardo Silva</option>
<option>Dra. Maria Helena</option>
<option>Análise Paralegal</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Divider -->
<div class="pt-4 border-t border-outline-variant/10 flex items-center justify-between">
<div class="flex -space-x-2">
<img alt="Profile 1" class="w-8 h-8 rounded-full border-2 border-surface" data-alt="Professional male lawyer portrait photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcc8-UUFlDE3_asLXz5KkZATLGhMvgPsE1P3K9MSi--cLZ6a4UOJ2SUw0YyF1IeouLceVLH2K8rYmNa4AcqJ-fi00SrHyfJ5RqDfMRYbfKsRktMeQ0YjwwFXxUNpNj-AQdrVznCaZ_HdzBtUIcV9zbVgS4ufyKbpWuqBtWFruz7vLBkA-rnkaK1KsFeBlDrRgWDLx3CrAFsn9mxDThgH_kzCtQwR4DS9f4kKLF1TDs7nScDG9LaxYYspCKMV908PHNqr9-JkEYODLH"/>
<img alt="Profile 2" class="w-8 h-8 rounded-full border-2 border-surface" data-alt="Professional female lawyer portrait photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDA_InOJDHvkapj8RZb5KgjiRvsu7KRk1Ri6bhiHV2Q39Wacz4QkSXG1Wv7mBdpYMQSSuqkmliIkncY9maY95tJlJvOhEJqxo1towNR8HkZokIyazAEpEyGE20tUzCZHLt9o8tPYgRDH0DCtnErG-ZTeBDokZDKexlPdk-aZ6W2zAuuPuGSBozV789Pj81MY6p0q6EO6VZ8dqQBzgTNn4euND9AqLj1gdrAFvS1na0GLtgbv-LAQqE27ZO9ieUo5QvNOfhg30Y50qFb"/>
<div class="w-8 h-8 rounded-full border-2 border-surface bg-surface-container-highest flex items-center justify-center text-[10px] font-bold text-primary">+3</div>
</div>
<p class="text-[11px] text-outline italic">Estes membros receberão uma notificação.</p>
</div>
</div>
<!-- Modal Footer -->
<div class="px-8 py-6 bg-surface-container-low/50 flex items-center justify-end gap-4">
<button class="px-6 py-2.5 text-sm font-medium text-outline hover:text-on-surface transition-colors">
                    Cancelar
                </button>
<button class="px-8 py-2.5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="save">save</span>
                    Salvar Nota
                </button>
</div>
</div>
</div>
</body></html>
