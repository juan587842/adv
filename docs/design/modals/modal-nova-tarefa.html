<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#31394d",
            "on-secondary": "#233143",
            "tertiary-fixed": "#d8e2ff",
            "primary-container": "#c9a96e",
            "background": "#0b1326",
            "secondary-fixed": "#d4e4fa",
            "surface-container-high": "#222a3d",
            "inverse-on-surface": "#283044",
            "on-background": "#dae2fd",
            "on-surface-variant": "#d0c5b5",
            "on-primary-container": "#543d0c",
            "on-surface": "#dae2fd",
            "on-error-container": "#ffdad6",
            "primary-fixed-dim": "#e4c285",
            "on-primary": "#412d00",
            "surface": "#0b1326",
            "on-error": "#690005",
            "outline": "#998f81",
            "surface-container-highest": "#2d3449",
            "on-secondary-fixed": "#0d1c2d",
            "on-secondary-container": "#a7b6cc",
            "outline-variant": "#4d463a",
            "on-primary-fixed-variant": "#5a4312",
            "surface-dim": "#0b1326",
            "surface-container-lowest": "#060e20",
            "secondary-container": "#39485a",
            "on-primary-fixed": "#261900",
            "inverse-surface": "#dae2fd",
            "secondary-fixed-dim": "#b9c8de",
            "secondary": "#b9c8de",
            "on-tertiary-fixed-variant": "#374669",
            "tertiary": "#b8c8f2",
            "inverse-primary": "#745a27",
            "primary-fixed": "#ffdea4",
            "on-tertiary-container": "#314163",
            "surface-variant": "#2d3449",
            "surface-container": "#171f33",
            "on-secondary-fixed-variant": "#39485a",
            "error-container": "#93000a",
            "tertiary-fixed-dim": "#b6c6ef",
            "tertiary-container": "#9dadd5",
            "surface-tint": "#e4c285",
            "surface-container-low": "#131b2e",
            "error": "#ffb4ab",
            "primary": "#e6c487",
            "on-tertiary-fixed": "#081b3b",
            "on-tertiary": "#203051"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .glass-effect {
      background: rgba(45, 52, 73, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body overflow-hidden">
<!-- Blurred Background Content (Dashboard Simulation) -->
<div class="flex h-screen blur-md pointer-events-none select-none">
<!-- SideNavBar -->
<aside class="flex flex-col h-full p-6 border-r border-slate-800/30 bg-[#0b1326] dark:bg-slate-950/60 backdrop-blur-xl h-screen w-64 fixed left-0 top-0 shadow-2xl shadow-slate-950/50 z-10">
<div class="mb-10 flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container">gavel</span>
</div>
<div>
<h1 class="text-2xl font-black tracking-tighter text-[#e6c487]">Juris AI</h1>
<p class="text-[0.65rem] uppercase tracking-widest text-outline">Sovereign Counsel</p>
</div>
</div>
<nav class="flex-1 space-y-2">
<div class="flex items-center gap-3 p-3 text-[#e6c487] bg-[#2d3449]/50 rounded-xl font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">insights</span>
          Intelligence
        </div>
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:bg-[#171f33] hover:text-[#e6c487] transition-all duration-300 rounded-xl font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">gavel</span>
          Cases
        </div>
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:bg-[#171f33] hover:text-[#e6c487] transition-all duration-300 rounded-xl font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">description</span>
          Documents
        </div>
</nav>
</aside>
<!-- Main Content Simulation -->
<main class="ml-64 flex-1 p-12">
<div class="max-w-6xl mx-auto">
<header class="flex justify-between items-end mb-12">
<div>
<h2 class="text-4xl font-headline font-bold text-on-surface tracking-tight">Executive Summary</h2>
<p class="text-outline mt-2">Global oversight of ongoing litigation and intelligence.</p>
</div>
</header>
<div class="grid grid-cols-3 gap-6">
<div class="col-span-2 h-64 bg-surface-container rounded-xl"></div>
<div class="h-64 bg-surface-container rounded-xl"></div>
<div class="h-96 bg-surface-container rounded-xl"></div>
<div class="col-span-2 h-96 bg-surface-container rounded-xl"></div>
</div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background/40 backdrop-blur-[2px]">
<!-- Modal Container -->
<div class="glass-effect w-full max-w-2xl rounded-xl shadow-2xl border border-white/5 overflow-hidden scale-[1] transition-transform duration-300">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-6 flex justify-between items-center">
<div>
<h2 class="text-2xl font-headline font-bold text-primary tracking-tight">Nova Tarefa / Diligência</h2>
<p class="text-sm text-outline mt-1 font-light">Adicione uma nova prioridade ao fluxo de trabalho.</p>
</div>
<button class="p-2 text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="px-8 py-4 space-y-6">
<!-- Título -->
<div class="space-y-2">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Título da Tarefa</label>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Ex: Protocolo de Recurso Especial" type="text"/>
</div>
<!-- Horizontal Group: Data & Responsável -->
<div class="grid grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Data Limite</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all outline-none [color-scheme:dark]" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Responsável</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/20 transition-all outline-none">
<option>Selecione o Consultor</option>
<option>Dr. Ricardo Menezes</option>
<option>Dra. Elena Vance</option>
<option>Conselho Sênior</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Caso Vinculado Search -->
<div class="space-y-2">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Caso Vinculado</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-5 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Pesquisar por número ou nome do processo..." type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
</div>
</div>
<!-- Descrição -->
<div class="space-y-2">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Descrição</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/20 transition-all outline-none resize-none" placeholder="Detalhes adicionais e contexto da diligência..." rows="3"></textarea>
</div>
<!-- Priority Chips -->
<div class="space-y-3">
<label class="text-[0.7rem] uppercase tracking-[0.1em] font-semibold text-outline-variant">Nível de Prioridade</label>
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border border-outline-variant/30 hover:bg-surface-container transition-all group">
<span class="w-2 h-2 rounded-full bg-emerald-500/60"></span>
<span class="text-sm font-medium text-outline group-hover:text-on-surface">Baixa</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border border-primary/40 bg-primary/5 transition-all group">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(230,196,135,0.6)]"></span>
<span class="text-sm font-semibold text-primary">Média</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border border-outline-variant/30 hover:bg-surface-container transition-all group">
<span class="w-2 h-2 rounded-full bg-error/60"></span>
<span class="text-sm font-medium text-outline group-hover:text-on-surface">Alta</span>
</button>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-8 py-8 mt-4 bg-surface-container-low/40 flex justify-end items-center gap-4">
<button class="px-6 py-3 text-sm font-semibold text-outline hover:text-on-surface transition-colors">
          Cancelar
        </button>
<button class="px-10 py-3 bg-gradient-to-tr from-primary to-primary-container text-on-primary-container font-bold rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
          Criar Tarefa
        </button>
</div>
</div>
</div>
</body></html>
