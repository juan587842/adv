<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#b6c6ef",
              "secondary-fixed": "#d4e4fa",
              "primary-fixed": "#ffdea4",
              "on-error": "#690005",
              "surface-container-low": "#131b2e",
              "on-tertiary-fixed-variant": "#374669",
              "secondary-fixed-dim": "#b9c8de",
              "on-primary-fixed": "#261900",
              "outline-variant": "#4d463a",
              "on-secondary-container": "#a7b6cc",
              "on-secondary": "#233143",
              "primary-container": "#c9a96e",
              "on-primary-fixed-variant": "#5a4312",
              "primary": "#e6c487",
              "secondary": "#b9c8de",
              "error": "#ffb4ab",
              "surface-container-lowest": "#060e20",
              "outline": "#998f81",
              "error-container": "#93000a",
              "tertiary-fixed": "#d8e2ff",
              "on-surface-variant": "#d0c5b5",
              "on-primary-container": "#543d0c",
              "surface-tint": "#e4c285",
              "surface-dim": "#0b1326",
              "inverse-surface": "#dae2fd",
              "on-background": "#dae2fd",
              "on-tertiary-container": "#314163",
              "on-secondary-fixed-variant": "#39485a",
              "inverse-on-surface": "#283044",
              "surface-variant": "#2d3449",
              "surface-bright": "#31394d",
              "background": "#0b1326",
              "tertiary": "#b8c8f2",
              "surface-container-high": "#222a3d",
              "on-tertiary": "#203051",
              "on-primary": "#412d00",
              "on-error-container": "#ffdad6",
              "surface-container": "#171f33",
              "surface": "#0b1326",
              "on-surface": "#dae2fd",
              "surface-container-highest": "#2d3449",
              "tertiary-container": "#9dadd5",
              "inverse-primary": "#745a27",
              "on-secondary-fixed": "#0d1c2d",
              "primary-fixed-dim": "#e4c285",
              "secondary-container": "#39485a",
              "on-tertiary-fixed": "#081b3b"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-modal {
        background: rgba(45, 52, 73, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      body {
        background-color: #0b1326;
        color: #dae2fd;
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>
<body class="overflow-hidden">
<!-- Background Dossier (Blurred State) -->
<div class="fixed inset-0 z-0 flex overflow-hidden filter blur-md grayscale-[0.2] opacity-40">
<!-- Sidebar Shell Placeholder -->
<aside class="w-64 h-screen bg-[#0b1326] border-r border-[#171f33] py-6 flex flex-col">
<div class="px-6 mb-8">
<div class="h-8 w-32 bg-surface-container rounded-lg"></div>
</div>
<nav class="flex-1 space-y-2 px-4">
<div class="h-10 w-full bg-surface-container rounded-lg"></div>
<div class="h-10 w-full bg-surface-container-highest rounded-lg"></div>
<div class="h-10 w-full bg-surface-container rounded-lg"></div>
</nav>
</aside>
<!-- Main Content Area Placeholder -->
<main class="flex-1 p-12 space-y-8">
<header class="flex justify-between items-center">
<div class="space-y-2">
<div class="h-10 w-64 bg-surface-container rounded-lg"></div>
<div class="h-4 w-48 bg-surface-container-low rounded-lg"></div>
</div>
<div class="h-12 w-48 bg-primary-container rounded-xl"></div>
</header>
<!-- Bento Grid Mockup -->
<div class="grid grid-cols-3 gap-6">
<div class="col-span-2 h-64 bg-surface-container rounded-xl"></div>
<div class="h-64 bg-surface-container rounded-xl"></div>
<div class="h-96 bg-surface-container rounded-xl"></div>
<div class="col-span-2 h-96 bg-surface-container rounded-xl"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
<!-- Modal Container -->
<div class="glass-modal w-full max-w-2xl rounded-xl shadow-2xl border border-white/5 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-start">
<div>
<h2 class="text-2xl font-bold tracking-tight text-primary font-headline uppercase">Adicionar Movimentação Manual</h2>
<p class="text-sm text-outline mt-1 font-body">Insira os detalhes do novo evento jurídico no dossiê do processo.</p>
</div>
<button class="text-outline hover:text-on-surface transition-colors p-2 hover:bg-white/5 rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content Form -->
<form class="p-8 pt-4 space-y-6">
<div class="grid grid-cols-2 gap-6">
<!-- Date Input -->
<div class="space-y-2">
<label class="block text-xs font-bold tracking-widest text-outline uppercase ml-1">Data</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all outline-none" required="" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none group-focus-within:text-primary">calendar_today</span>
</div>
</div>
<!-- Event Type Dropdown -->
<div class="space-y-2">
<label class="block text-xs font-bold tracking-widest text-outline uppercase ml-1">Tipo de Evento</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-low border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all outline-none cursor-pointer" required="">
<option disabled="" selected="" value="">Selecione o tipo</option>
<option value="audiencia">Audiência</option>
<option value="peticao">Petição</option>
<option value="despacho">Despacho</option>
<option value="sentenca">Sentença</option>
<option value="outros">Outros</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none group-focus-within:text-primary">expand_more</span>
</div>
</div>
</div>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="block text-xs font-bold tracking-widest text-outline uppercase ml-1">Descrição</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all outline-none resize-none placeholder:text-outline/50" placeholder="Descreva os detalhes da movimentação..." rows="4"></textarea>
</div>
<!-- File Upload Zone -->
<div class="space-y-2">
<label class="block text-xs font-bold tracking-widest text-outline uppercase ml-1">Upload de Documento</label>
<div class="group relative flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-outline-variant hover:border-primary/50 transition-all rounded-xl bg-surface-container-low/50 cursor-pointer">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary transition-colors mb-2" data-weight="fill">cloud_upload</span>
<p class="text-sm text-outline group-hover:text-on-surface transition-colors"><span class="font-semibold text-primary">Clique para enviar</span> ou arraste e solte</p>
<p class="text-xs text-outline/60 mt-1">PDF, DOCX ou JPG (Máx. 25MB)</p>
</div>
<input class="hidden" type="file"/>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-4 pt-4">
<button class="px-8 py-3 rounded-xl border border-outline/20 text-on-surface font-medium hover:bg-white/5 transition-all active:scale-95" type="button">
                        Cancelar
                    </button>
<button class="px-8 py-3 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all active:scale-95 flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-xl">add_circle</span>
                        Adicionar Movimentação
                    </button>
</div>
</form>
<!-- Bottom Accent Line -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary/30 to-transparent opacity-50"></div>
</div>
</div>
</body></html>
