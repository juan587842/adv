<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#171f33",
              "on-background": "#dae2fd",
              "on-tertiary-container": "#314163",
              "on-secondary": "#233143",
              "error": "#ffb4ab",
              "on-primary": "#412d00",
              "surface-container-low": "#131b2e",
              "on-surface-variant": "#d0c5b5",
              "surface-bright": "#31394d",
              "on-error-container": "#ffdad6",
              "background": "#0b1326",
              "outline": "#998f81",
              "primary": "#e6c487",
              "surface-container-high": "#222a3d",
              "inverse-primary": "#745a27",
              "surface-tint": "#e4c285",
              "on-primary-fixed": "#261900",
              "surface-container-highest": "#2d3449",
              "tertiary-fixed": "#d8e2ff",
              "tertiary": "#b8c8f2",
              "inverse-on-surface": "#283044",
              "primary-fixed": "#ffdea4",
              "primary-fixed-dim": "#e4c285",
              "on-secondary-container": "#a7b6cc",
              "surface-dim": "#0b1326",
              "on-primary-container": "#543d0c",
              "inverse-surface": "#dae2fd",
              "on-tertiary-fixed-variant": "#374669",
              "on-tertiary-fixed": "#081b3b",
              "on-secondary-fixed-variant": "#39485a",
              "tertiary-fixed-dim": "#b6c6ef",
              "tertiary-container": "#9dadd5",
              "surface-container-lowest": "#060e20",
              "secondary": "#b9c8de",
              "on-error": "#690005",
              "secondary-fixed-dim": "#b9c8de",
              "on-secondary-fixed": "#0d1c2d",
              "secondary-container": "#39485a",
              "on-tertiary": "#203051",
              "on-surface": "#dae2fd",
              "primary-container": "#c9a96e",
              "on-primary-fixed-variant": "#5a4312",
              "error-container": "#93000a",
              "surface-variant": "#2d3449",
              "outline-variant": "#4d463a",
              "surface": "#0b1326",
              "secondary-fixed": "#d4e4fa"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .glass-input {
            background: rgba(45, 52, 73, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(153, 143, 129, 0.2);
        }
        .glass-input:focus-within {
            border-color: #e6c487;
            box-shadow: 0 0 0 2px rgba(230, 196, 135, 0.1);
        }
        .glass-card {
            background: rgba(23, 31, 51, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(230, 196, 135, 0.15);
        }
        body {
            background: #0b1326;
        }
    </style>
</head>
<body class="text-on-background font-body min-h-screen overflow-hidden">
<!-- Background: Blurred Case List Simulation (Inspired by SCREEN_8) -->
<div class="fixed inset-0 z-0 blur-md opacity-40 scale-105 pointer-events-none">
<header class="flex items-center justify-between px-8 py-6 border-b border-white/5">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-primary/20 rounded-lg"></div>
<div class="h-6 w-32 bg-white/10 rounded"></div>
</div>
<div class="h-10 w-48 bg-white/10 rounded-full"></div>
</header>
<main class="p-8 space-y-4">
<div class="h-8 w-40 bg-white/20 rounded mb-8"></div>
<div class="grid grid-cols-3 gap-6">
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
<div class="h-64 bg-surface-container rounded-2xl border border-white/5"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/60 backdrop-blur-sm">
<!-- Desktop Modal Card -->
<div class="glass-card w-full max-w-4xl rounded-[2rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
<!-- Modal Header -->
<header class="flex items-center justify-between px-8 py-6 border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="add_circle">add_circle</span>
<h2 class="font-semibold text-xl tracking-tight text-on-surface">Novo Caso</h2>
</div>
<button class="hover:bg-white/5 transition-colors p-2 rounded-full group active:scale-95">
<span class="material-symbols-outlined text-outline group-hover:text-primary" data-icon="close">close</span>
</button>
</header>
<!-- Modal Content (Scrollable Form) -->
<main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
<form class="space-y-8">
<!-- Row 1: Case Title and Process Number -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Título do Caso</label>
<div class="glass-input rounded-xl p-1">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 px-4 placeholder:text-outline/40" placeholder="Ex: Silva vs. Empresa ABC" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Número do Processo (CNJ)</label>
<div class="glass-input rounded-xl p-1 flex items-center">
<span class="material-symbols-outlined text-outline/60 px-3 text-lg" data-icon="gavel">gavel</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 pr-4 placeholder:text-outline/40" placeholder="0000000-00.0000.0.00.0000" type="text"/>
</div>
</div>
</div>
<!-- Row 2: Client and Area -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Cliente</label>
<div class="glass-input rounded-xl p-1 flex items-center group">
<span class="material-symbols-outlined text-outline/60 px-3 text-lg group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 pr-4 placeholder:text-outline/40" placeholder="Buscar ou adicionar cliente..." type="text"/>
<button class="p-2 mr-1 hover:bg-surface-container-highest rounded-lg transition-colors" type="button">
<span class="material-symbols-outlined text-primary text-lg" data-icon="search">search</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Área do Direito</label>
<div class="glass-input rounded-xl p-1">
<select class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 px-4 appearance-none cursor-pointer">
<option class="bg-surface-container">Selecionar área...</option>
<option class="bg-surface-container">Trabalhista</option>
<option class="bg-surface-container">Cível</option>
<option class="bg-surface-container">Criminal</option>
<option class="bg-surface-container">Tributário</option>
</select>
</div>
</div>
</div>
<!-- Row 3: Value and Responsible Lawyer -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Valor da Causa</label>
<div class="glass-input rounded-xl p-1 flex items-center">
<span class="text-primary font-bold px-4">R$</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 pr-4 placeholder:text-outline/40 font-medium" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Advogado Responsável</label>
<div class="glass-input rounded-xl p-1 flex items-center">
<div class="pl-3">
<img class="w-8 h-8 rounded-full border border-primary/20 object-cover" data-alt="Professional lawyer headshot" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyS1_Kc0PbjQ__1kCCZgamRbj_3KvbDIEwUpDt2YjhQ-Cp4LGi4OgMVlUUIsrxtNG7Gv4VVGHDWb7Xhj3L00FJBjNZL81FgESGa0jMkDsNN0n5S7tuXKeZmzF4PXdUV1MvJAQM6bUnGt5CqYbE5yqIOY4M8xxMMImPREWYvMTdo2dsn5iI-Xw8heUcXcSxUF73f0Ucu8Wlg5xZK-lZV69dj1RPUozUAbj5llK3YOKp5LWqSGPr3uogOr7-Ie4qy9jOCGajZNpmp3bw"/>
</div>
<select class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 px-2 appearance-none cursor-pointer">
<option class="bg-surface-container">Dr. Ricardo Mello</option>
<option class="bg-surface-container">Dra. Amanda Silva</option>
<option class="bg-surface-container">Dr. Jonas Oliveira</option>
</select>
</div>
</div>
</div>
<!-- Full Width: File Upload -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-widest font-bold text-outline">Anexar Petição Inicial</label>
<div class="border-2 border-dashed border-white/10 rounded-[1.5rem] p-12 flex flex-col items-center justify-center bg-white/[0.02] hover:bg-white/[0.05] hover:border-primary/40 transition-all cursor-pointer group">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="text-base font-semibold text-on-surface">Arraste a petição aqui ou clique para selecionar</p>
<p class="text-xs text-outline mt-2 tracking-wide uppercase">PDF, DOCX até 10MB</p>
</div>
</div>
</form>
</main>
<!-- Modal Footer (Actions) -->
<footer class="px-8 py-6 border-t border-white/5 flex items-center justify-end gap-4 bg-white/[0.02]">
<button class="px-6 py-3 rounded-xl text-sm font-bold text-outline hover:text-on-surface hover:bg-white/5 transition-all">
                    Cancelar
                </button>
<button class="px-8 py-3 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-bold shadow-xl shadow-primary/10 hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center gap-2">
<span>Criar Caso</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</div>
</div>
</body></html>
