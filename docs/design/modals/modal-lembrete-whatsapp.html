<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#31394d",
              "on-secondary": "#233143",
              "tertiary-fixed": "#d8e2ff",
              "primary-container": "#c9a96e",
              "background": "#0b1326",
              "secondary-fixed": "#d4e4fa",
              "surface-container-high": "#222a3d",
              "inverse-on-surface": "#283044",
              "on-background": "#dae2fd",
              "on-surface-variant": "#d0c5b5",
              "on-primary-container": "#543d0c",
              "on-surface": "#dae2fd",
              "on-error-container": "#ffdad6",
              "primary-fixed-dim": "#e4c285",
              "on-primary": "#412d00",
              "surface": "#0b1326",
              "on-error": "#690005",
              "outline": "#998f81",
              "surface-container-highest": "#2d3449",
              "on-secondary-fixed": "#0d1c2d",
              "on-secondary-container": "#a7b6cc",
              "outline-variant": "#4d463a",
              "on-primary-fixed-variant": "#5a4312",
              "surface-dim": "#0b1326",
              "surface-container-lowest": "#060e20",
              "secondary-container": "#39485a",
              "on-primary-fixed": "#261900",
              "inverse-surface": "#dae2fd",
              "secondary-fixed-dim": "#b9c8de",
              "secondary": "#b9c8de",
              "on-tertiary-fixed-variant": "#374669",
              "tertiary": "#b8c8f2",
              "inverse-primary": "#745a27",
              "primary-fixed": "#ffdea4",
              "on-tertiary-container": "#314163",
              "surface-variant": "#2d3449",
              "surface-container": "#171f33",
              "on-secondary-fixed-variant": "#39485a",
              "error-container": "#93000a",
              "tertiary-fixed-dim": "#b6c6ef",
              "tertiary-container": "#9dadd5",
              "surface-tint": "#e4c285",
              "surface-container-low": "#131b2e",
              "error": "#ffb4ab",
              "primary": "#e6c487",
              "on-tertiary-fixed": "#081b3b",
              "on-tertiary": "#203051"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(16px);
        background: rgba(45, 52, 73, 0.6);
      }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center p-6">
<!-- Sidebar (As per JSON hierarchy) -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-[#0b1326] dark:bg-slate-950/60 backdrop-blur-xl flex flex-col p-6 border-r border-slate-800/30 shadow-2xl shadow-slate-950/50 z-50">
<div class="mb-10">
<span class="text-2xl font-black tracking-tighter text-[#e6c487]">Juris AI</span>
<p class="text-[0.65rem] tracking-[0.2em] uppercase text-outline mt-1">Sovereign Counsel</p>
</div>
<nav class="flex-1 space-y-2">
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:bg-[#171f33] hover:text-[#e6c487] transition-all duration-300 rounded-xl cursor-pointer font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">insights</span> Intelligence
            </div>
<div class="flex items-center gap-3 p-3 text-[#e6c487] bg-[#2d3449]/50 rounded-xl cursor-pointer font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">gavel</span> Cases
            </div>
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:bg-[#171f33] hover:text-[#e6c487] transition-all duration-300 rounded-xl cursor-pointer font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">description</span> Documents
            </div>
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:bg-[#171f33] hover:text-[#e6c487] transition-all duration-300 rounded-xl cursor-pointer font-['Inter'] font-medium tracking-wide text-[0.875rem] uppercase">
<span class="material-symbols-outlined">group</span> Clients
            </div>
</nav>
<div class="mt-auto pt-6 border-t border-slate-800/30 space-y-2">
<div class="flex items-center gap-3 p-3 text-[#998f81] hover:text-white transition-colors cursor-pointer text-sm uppercase tracking-wider">
<span class="material-symbols-outlined">settings</span> Settings
            </div>
</div>
</aside>
<!-- Main Content Context (Case Details Background) -->
<main class="ml-64 w-full max-w-7xl">
<div class="grid grid-cols-12 gap-6 opacity-30 pointer-events-none select-none">
<div class="col-span-8 space-y-6">
<div class="bg-surface-container rounded-xl p-8 h-64 border border-outline-variant/10"></div>
<div class="grid grid-cols-2 gap-6">
<div class="bg-surface-container-low rounded-xl p-8 h-48"></div>
<div class="bg-surface-container-low rounded-xl p-8 h-48"></div>
</div>
</div>
<div class="col-span-4 bg-surface-container-high rounded-xl p-8 h-[500px]"></div>
</div>
</main>
<!-- OVERLAY & MODAL -->
<div class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
<!-- Modal Container -->
<section class="w-full max-w-md glass-effect border border-outline-variant/20 rounded-[1.5rem] shadow-2xl overflow-hidden flex flex-col">
<!-- Modal Header -->
<div class="p-6 pb-2 flex items-start justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-[#25D366]/10 flex items-center justify-center text-[#25D366]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<div>
<h2 class="text-xl font-headline font-bold text-on-surface tracking-tight">Configurar Lembrete</h2>
<p class="text-xs text-outline font-label uppercase tracking-widest mt-0.5">Notificação WhatsApp</p>
</div>
</div>
<button class="text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-6">
<!-- Message Input Section -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-[0.7rem] font-bold text-outline uppercase tracking-[0.1em]">Conteúdo da Mensagem</label>
<span class="text-[0.65rem] text-primary/60 font-medium">Use {{cliente}} para personalizar</span>
</div>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-on-surface text-sm focus:ring-2 focus:ring-primary/20 min-h-[100px] placeholder:text-outline/40 resize-none" placeholder="Olá {{cliente}}, gostaria de confirmar nossa reunião de amanhã sobre o caso..."></textarea>
</div>
<!-- Schedule Section -->
<div class="space-y-3">
<label class="text-[0.7rem] font-bold text-outline uppercase tracking-[0.1em]">Agendamento</label>
<div class="grid grid-cols-1 gap-2">
<!-- Option 1 -->
<label class="group cursor-pointer">
<input checked="" class="hidden peer" name="schedule" type="radio"/>
<div class="flex items-center justify-between p-3 rounded-xl bg-surface-container-low border border-transparent peer-checked:border-primary/40 peer-checked:bg-primary/5 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">schedule</span>
<span class="text-sm font-medium">Daqui a 2h</span>
</div>
<div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Option 2 -->
<label class="group cursor-pointer">
<input class="hidden peer" name="schedule" type="radio"/>
<div class="flex items-center justify-between p-3 rounded-xl bg-surface-container-low border border-transparent peer-checked:border-primary/40 peer-checked:bg-primary/5 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">wb_twilight</span>
<span class="text-sm font-medium">Amanhã 9h</span>
</div>
<div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Option 3 -->
<label class="group cursor-pointer">
<input class="hidden peer" name="schedule" type="radio"/>
<div class="flex items-center justify-between p-3 rounded-xl bg-surface-container-low border border-transparent peer-checked:border-primary/40 peer-checked:bg-primary/5 transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">event_note</span>
<span class="text-sm font-medium">Personalizado</span>
</div>
<div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
</div>
</div>
<!-- Footer Action -->
<div class="pt-2">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-bold py-4 rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">send_time_extension</span>
                        Agendar Lembrete
                    </button>
<p class="text-center text-[0.65rem] text-outline mt-4 leading-relaxed px-4">
                        O lembrete será enviado automaticamente via API oficial do WhatsApp Business.
                    </p>
</div>
</div>
</section>
</div>
</body></html>
