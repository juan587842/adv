<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#d4e4fa",
              "surface-tint": "#e4c285",
              "outline-variant": "#4d463a",
              "surface-dim": "#0b1326",
              "secondary": "#b9c8de",
              "on-primary-container": "#543d0c",
              "inverse-surface": "#dae2fd",
              "tertiary-container": "#9dadd5",
              "surface": "#0b1326",
              "surface-container-low": "#131b2e",
              "error": "#ffb4ab",
              "on-secondary-container": "#a7b6cc",
              "on-secondary-fixed": "#0d1c2d",
              "tertiary": "#b8c8f2",
              "on-tertiary-fixed": "#081b3b",
              "on-tertiary": "#203051",
              "on-primary": "#412d00",
              "surface-container-high": "#222a3d",
              "on-primary-fixed-variant": "#5a4312",
              "inverse-primary": "#745a27",
              "on-surface-variant": "#d0c5b5",
              "outline": "#998f81",
              "error-container": "#93000a",
              "surface-container-lowest": "#060e20",
              "surface-container-highest": "#2d3449",
              "primary": "#e6c487",
              "on-primary-fixed": "#261900",
              "surface-container": "#171f33",
              "tertiary-fixed-dim": "#b6c6ef",
              "on-surface": "#dae2fd",
              "on-secondary-fixed-variant": "#39485a",
              "background": "#0b1326",
              "tertiary-fixed": "#d8e2ff",
              "secondary-fixed-dim": "#b9c8de",
              "on-error-container": "#ffdad6",
              "on-background": "#dae2fd",
              "secondary-container": "#39485a",
              "inverse-on-surface": "#283044",
              "on-error": "#690005",
              "surface-bright": "#31394d",
              "primary-container": "#c9a96e",
              "primary-fixed-dim": "#e4c285",
              "primary-fixed": "#ffdea4",
              "surface-variant": "#2d3449",
              "on-tertiary-container": "#314163",
              "on-secondary": "#233143",
              "on-tertiary-fixed-variant": "#374669"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(45, 52, 73, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tonal-transition {
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<!-- Background Calendar Simulation (The Context) -->
<div class="fixed inset-0 grid grid-cols-7 grid-rows-6 opacity-20 pointer-events-none p-8 gap-4">
<div class="bg-surface-container rounded-xl border-outline/10 border p-4"></div>
<div class="bg-surface-container rounded-xl border-outline/10 border p-4"></div>
<div class="bg-surface-container-high rounded-xl border-outline/20 border p-4 flex flex-col gap-2">
<div class="h-4 w-1/2 bg-primary/20 rounded"></div>
<div class="h-3 w-3/4 bg-on-surface-variant/10 rounded"></div>
</div>
<div class="bg-surface-container rounded-xl border-outline/10 border p-4"></div>
<div class="bg-surface-container rounded-xl border-outline/10 border p-4"></div>
<div class="bg-surface-container-highest rounded-xl border-primary/30 border p-4 flex flex-col gap-2">
<div class="h-4 w-2/3 bg-primary/40 rounded"></div>
</div>
<div class="bg-surface-container rounded-xl border-outline/10 border p-4"></div>
<!-- Repeating grid items... -->
<div class="bg-surface-container rounded-xl border-outline/10 border p-4" v-for="i in 28"></div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-surface-container-lowest/80 backdrop-blur-sm p-6">
<!-- Modal Container -->
<div class="glass-panel w-full max-w-2xl rounded-xl shadow-2xl shadow-surface-container-lowest/50 flex flex-col overflow-hidden border border-white/5">
<!-- Header -->
<header class="flex items-center justify-between px-8 py-6 bg-white/5 border-b border-white/5">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="event_note">event_note</span>
</div>
<div>
<h1 class="text-xl font-headline font-bold tracking-tight text-on-surface">Agendar Evento/Prazo</h1>
<p class="text-xs font-label text-slate-400 tracking-widest uppercase">Sovereign Counsel • Gestão de Agenda</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Form Content -->
<form class="p-8 space-y-8 max-h-[768px] overflow-y-auto custom-scrollbar">
<!-- Title Field -->
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Título do Evento</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Ex: Audiência de Instrução e Julgamento" type="text"/>
</div>
<!-- Type & Priority Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Tipo de Evento</label>
<div class="relative group">
<select class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary/20 cursor-pointer">
<option>Audiência</option>
<option>Prazo Processual</option>
<option>Reunião com Cliente</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex items-end pb-2">
<label class="flex items-center gap-3 cursor-pointer group bg-surface-container-low/50 hover:bg-error-container/20 p-4 rounded-xl transition-all w-full border border-transparent hover:border-error/20">
<input class="w-5 h-5 rounded border-outline bg-transparent text-error focus:ring-error focus:ring-offset-0" type="checkbox"/>
<div class="flex flex-col">
<span class="text-sm font-medium text-on-surface group-hover:text-error transition-colors">Prazo Peremptório</span>
<span class="text-[10px] text-on-surface-variant uppercase">Prioridade Crítica</span>
</div>
</label>
</div>
</div>
<!-- Date & Time Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="md:col-span-2 space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Data do Evento</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 outline-none" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="calendar_month">calendar_month</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Horário</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 outline-none" type="time"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="schedule">schedule</span>
</div>
</div>
</div>
<!-- Linked Case (Searchable) -->
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Processo Vinculado</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 outline-none" placeholder="Buscar por número ou parte..." type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>
</div>
<div class="flex gap-2 pt-1">
<span class="bg-surface-container-highest px-3 py-1 rounded-full text-[10px] text-on-surface-variant border border-white/5">Últimos: 0012345-67.2023.8.26.0100</span>
</div>
</div>
<!-- Reminders Toggles -->
<div class="bg-surface-container-low rounded-xl p-6 space-y-4">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant mb-2 block">Lembretes e Notificações</label>
<div class="flex flex-wrap gap-8">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative inline-flex items-center">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
<span class="text-sm font-medium text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-green-400 text-lg" data-icon="chat">chat</span> WhatsApp
                            </span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative inline-flex items-center">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
<span class="text-sm font-medium text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-blue-400 text-lg" data-icon="mail">mail</span> E-mail
                            </span>
</label>
</div>
</div>
</form>
<!-- Footer Actions -->
<footer class="px-8 py-6 bg-white/5 border-t border-white/5 flex items-center justify-end gap-4">
<button class="px-6 py-3 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-white/5 rounded-xl transition-all">
                    Cancelar
                </button>
<button class="px-8 py-3 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:-translate-y-0.5 active:scale-95 transition-all flex items-center gap-2">
                    Confirmar Agendamento
                    <span class="material-symbols-outlined text-lg" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</footer>
</div>
</div>
<!-- Floating Toast/Status (Optional Context) -->
<div class="fixed bottom-8 right-8 z-[60] glass-panel p-4 rounded-xl border border-white/5 flex items-center gap-4 shadow-2xl">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<p class="text-xs font-label text-on-surface uppercase tracking-widest">Sincronizado com Tribunal Superior</p>
</div>
</body></html>
